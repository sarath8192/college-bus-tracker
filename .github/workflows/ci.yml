name: College Bus Tracker Advanced CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install

      - name: Frontend Security Audit
        run: npm audit --audit-level=high

      - name: Build frontend
        run: npm run build

  backend-test:
    name: Backend Test and Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Backend Security Audit
        run: |
          cd backend
          npm audit --audit-level=high

      - name: Run backend tests
        run: |
          cd backend
          npm test

  docker-build:
    name: Docker Image Build Check
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t college-bus-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t college-bus-frontend .