services:
  backend:
    build:
      context: ./backend
    container_name: college-bus-backend
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: .
    container_name: college-bus-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend